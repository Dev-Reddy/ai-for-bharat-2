name: Deploy Leados Website

on:
  push:
    branches:
      - main
    paths:
      - "apps/leados-website/**"
      - ".github/workflows/deploy-leados-website.yml"
      - ".github/workflows/vercel-deploy-reusable.yml"
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/vercel-deploy-reusable.yml
    with:
      app_name: leados-website
      app_path: apps/leados-website
    secrets:
      vercel_token: ${{ secrets.VERCEL_TOKEN }}
      vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
      vercel_project_id: ${{ secrets.VERCEL_PROJECT_ID_LEADOS_WEBSITE }}
